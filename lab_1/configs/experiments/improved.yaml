experiment_name: improved_visdrone_yolo11s
description: Улучшенный эксперимент с YOLO11s и повышенным разрешением для более точной детекции мелких объектов на VisDrone.
business_context: Автоматический мониторинг дорожной обстановки, пешеходных потоков и городских объектов с дронов для задач безопасности и транспортной аналитики.
dataset_name: VisDrone2019-DET
dataset_url: https://aiskyeye.com/submit-2023/object-detection-2/
dataset_yaml: data/visdrone_yolo/dataset.yaml
dataset_stats:
  train_images: 6471
  val_images: 548
expected_class_names:
  - pedestrian
  - people
  - bicycle
  - car
  - van
  - truck
  - tricycle
  - awning-tricycle
  - bus
  - motor
focus_classes:
  - pedestrian
  - people
  - bicycle
  - motor
model: yolo11s.pt
project: runs/lab1
notes:
  - Для мелких объектов в VisDrone особенно важно повысить точность локализации на плотных сценах.
  - Переход на YOLO11s и умеренно повышенное разрешение должен улучшить качество детекции по строгой метрике.
  - Фактический прогон остановлен после 2 эпох, так как лучший чекпойнт уже был сохранен и дальнейшее обучение не давало явного преимущества по времени.
hypotheses:
  - Повышенное разрешение улучшит детекцию малых классов pedestrian, people, bicycle и motor.
  - YOLO11s покажет лучший mAP50-95, чем YOLO11n, на сложных аэросценах.
  - AdamW и более щадящий learning rate сделают обучение стабильнее.
train:
  epochs: 2
  imgsz: 704
  batch: 8
  patience: 1
  workers: 0
  seed: 42
  device:
  pretrained: true
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  weight_decay: 0.0007
  warmup_epochs: 5.0
  mosaic: 1.0
  mixup: 0.05
  fliplr: 0.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.55
  close_mosaic: 1
val:
  split: val
  batch: 8
  imgsz: 704
  conf: 0.001
  iou: 0.7
predict:
  conf: 0.25
  imgsz: 704
